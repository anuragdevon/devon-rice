################
### MONITORS ###
################

# Laptop (left) — 15", 1.5x scale. Logical width = 1920/1.5 = 1280px
monitor = eDP-1, 1920x1080@60, 0x0, 1.5

# HDMI (right, primary) — 21", 1.0x scale. Positioned at x=1280 (after laptop)
monitor = HDMI-A-1, 1920x1080@60, 1280x0, 1.0

# Assign workspaces 1-7 to HDMI (primary), 8-10 to laptop
workspace = 1, monitor:HDMI-A-1, default:true
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1
workspace = 4, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1
workspace = 6, monitor:HDMI-A-1
workspace = 7, monitor:HDMI-A-1
workspace = 8, monitor:eDP-1
workspace = 9, monitor:eDP-1
workspace = 10, monitor:eDP-1

###################
### MY PROGRAMS ###
###################

$terminal = ghostty
$fileManager = nautilus
$menu = rofi -show drun

#################
### AUTOSTART ###
#################

exec-once = waybar
exec-once = hypridle
exec-once = hyprpaper
exec-once = swaync
exec-once = nm-applet &
exec-once = gnome-keyring-daemon --start --components=secrets,pkcs11
exec-once = wl-paste --watch cliphist store
exec-once = hyprpm reload -n
exec-once = ~/.config/hypr/set-wallpaper.sh --startup

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24
env = XCURSOR_THEME, Bibata-Modern-Classic
env = GDK_SCALE, 1
env = XDG_SESSION_TYPE, wayland
env = QT_QPA_PLATFORMTHEME, qt6ct
env = QT_STYLE_OVERRIDE, kvantum
env = QT_QPA_PLATFORM, wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = GTK_THEME, catppuccin-mocha-blue-standard+default
env = XCURSOR_THEME, Bibata-Modern-Classic

xwayland {
    force_zero_scaling = true
}

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle

    snap {
        enabled = true
        window_gap = 8
        monitor_gap = 8
    }
}

decoration {
    rounding = 12
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0
    dim_inactive = true
    dim_strength = 0.07

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(1a1a1a99)
        offset = 0 4
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,    0.23, 1,    0.32, 1
    bezier = emphasizedDecel, 0.05, 0.7,  0.1,  1.0
    bezier = menu_decel,      0.1,  1,    0.0,  1.0
    bezier = linear,          0,    0,    1,    1
    bezier = quick,           0.15, 0,    0.1,  1

    animation = global,        1, 10,  default
    animation = border,        1, 5,   easeOutQuint
    animation = windows,       1, 4,   emphasizedDecel
    animation = windowsIn,     1, 3,   emphasizedDecel, popin 80%
    animation = windowsOut,    1, 2,   quick,           popin 90%
    animation = fadeIn,        1, 2,   easeOutQuint
    animation = fadeOut,       1, 2,   quick
    animation = fade,          1, 3,   quick
    animation = layers,        1, 4,   easeOutQuint
    animation = layersIn,      1, 4,   easeOutQuint, fade
    animation = layersOut,     1, 1.5, linear,       fade
    animation = fadeLayersIn,  1, 2,   easeOutQuint
    animation = fadeLayersOut, 1, 1.5, quick
    animation = workspaces,    1, 7,   menu_decel,   slide
    animation = workspacesIn,  1, 5,   menu_decel,   slide
    animation = workspacesOut, 1, 4,   easeOutQuint, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# ── i3-style core binds ──────────────────────────────────────────
bind = $mainMod, Return,      exec, $terminal
bind = $mainMod, Q,           killactive,
bind = $mainMod, Space,       exec, $menu
bind = $mainMod, E,           exec, $fileManager
bind = $mainMod, F,           fullscreen, 0
bind = $mainMod SHIFT, Space, togglefloating,
bind = $mainMod, P,           pseudo,
bind = $mainMod, V,           layoutmsg, togglesplit

# ── Focus movement (i3-style: hjkl + arrows) ─────────────────────
bind = $mainMod, H,     movefocus, l
bind = $mainMod, L,     movefocus, r
bind = $mainMod, K,     movefocus, u
bind = $mainMod, J,     movefocus, d
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# ── Move windows (i3-style: SUPER+SHIFT+hjkl) ────────────────────
bind = $mainMod SHIFT, H,     movewindow, l
bind = $mainMod SHIFT, L,     movewindow, r
bind = $mainMod SHIFT, K,     movewindow, u
bind = $mainMod SHIFT, J,     movewindow, d
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# ── Resize windows (SUPER+CTRL+hjkl) ─────────────────────────────
binde = $mainMod CTRL, H, resizeactive, -40 0
binde = $mainMod CTRL, L, resizeactive,  40 0
binde = $mainMod CTRL, K, resizeactive, 0 -40
binde = $mainMod CTRL, J, resizeactive, 0  40

# ── Monitor focus / move ──────────────────────────────────────────
bind = $mainMod, comma,        focusmonitor, eDP-1
bind = $mainMod, period,       focusmonitor, HDMI-A-1
bind = $mainMod SHIFT, comma,  movewindow, mon:eDP-1
bind = $mainMod SHIFT, period, movewindow, mon:HDMI-A-1

# ── Workspaces ────────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ── Scratchpad ────────────────────────────────────────────────────
bind = $mainMod, S,            togglespecialworkspace, magic
bind = $mainMod SHIFT, minus,  movetoworkspace, special:magic

# ── Session / system ──────────────────────────────────────────────
bind = $mainMod, L,       exec, hyprlock
bind = $mainMod SHIFT, E, exec, wlogout
bind = $mainMod SHIFT, R, exec, hyprctl reload

# ── Calculator ────────────────────────────────────────────────────
bind = $mainMod, equal, exec, bash ~/.config/hypr/rofi-calc.sh

# ── Bluetooth ─────────────────────────────────────────────────────
bind = $mainMod, B,       exec, ghostty --title=bluetooth -e bluetoothctl

# ── Audio toggle (HDMI ↔ Bluetooth) ───────────────────────────────
bind = $mainMod SHIFT, A, exec, bash ~/.config/hypr/toggle-audio.sh

# ── Scroll workspaces ─────────────────────────────────────────────
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# ── Mouse window control ──────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ── Media / brightness keys ───────────────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPause,        exec, playerctl play-pause
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioPrev,         exec, playerctl previous

# ── Monitor toggle (dual ↔ laptop only) ───────────────────────
bind = $mainMod SHIFT, M, exec, ~/.config/hypr/toggle-monitor.sh

# ── Wallpaper ─────────────────────────────────────────────────
bind = $mainMod SHIFT, W, exec, ~/.config/hypr/set-wallpaper.sh

# ── Applications ──────────────────────────────────────────────
bind = $mainMod SHIFT, B,       exec, brave
bind = $mainMod, N, exec, swaync-client -t
bind = $mainMod, C, exec, ghostty --title=cava -e cava

# ── Screenshot ────────────────────────────────────────────────
# Super+Shift+S  → region select → clipboard  (quick grab)
bind = $mainMod SHIFT, S,  exec, hyprshot -m region --clipboard-only
# Print          → active window → clipboard
bind = , Print,            exec, hyprshot -m window -m active --clipboard-only
# Super+Print    → full monitor → clipboard
bind = $mainMod, Print,    exec, hyprshot -m output --clipboard-only
# Super+Ctrl+S   → region select → save file  ~/Pictures/Screenshots/
bind = $mainMod CTRL, S,   exec, hyprshot -m region -o ~/Pictures/Screenshots/
# Shift+Print    → active window → save file
bind = SHIFT, Print,       exec, hyprshot -m window -m active -o ~/Pictures/Screenshots/
# Ctrl+Print     → full monitor → save file
bind = CTRL, Print,        exec, hyprshot -m output -o ~/Pictures/Screenshots/

# ── Clipboard history (cliphist) ──────────────────────────────
bind = $mainMod SHIFT, V, exec, cliphist list | rofi -dmenu -p "Clipboard" | cliphist decode | wl-copy

# ── Workspace overview (hyprexpo) ─────────────────────────────
bind = $mainMod, Tab, hyprexpo:expo, toggle

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name = bluetooth-float
    match:class = blueman-manager
    float = yes
    size = 600 400
    center = yes
}

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    name = cava-float
    match:title = cava
    float = yes
    size = 600 200
    move = 50% 75%
}

# ── Always-float rules ────────────────────────────────────────
windowrule {
    name = float-pavucontrol
    match:class = pavucontrol
    float = yes
    size = 700 500
    center = yes
}

windowrule {
    name = float-calculator
    match:class = (gnome-calculator|qalculate-gtk)
    float = yes
    size = 400 600
    center = yes
}

windowrule {
    name = float-file-picker
    match:title = (Open File|Save File|Open Folder|Select a File)
    float = yes
    size = 900 600
    center = yes
}

windowrule {
    name = float-nm-applet
    match:class = nm-connection-editor
    float = yes
    center = yes
}


#####################
### PLUGINS        ###
#####################

plugin {
    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(1e1e2e)
        workspace_method = center current
    }
}
