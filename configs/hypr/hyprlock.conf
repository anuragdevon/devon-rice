background {
    monitor =
    path = /home/anurag/wallpapers/1.jpg
    blur_passes = 4
    blur_size = 8
    brightness = 0.4
    contrast = 1.0
    vibrancy = 0.2
}

# Avatar circle
image {
    monitor =
    path = /home/anurag/avatar.jpg
    size = 110
    rounding = -1
    border_size = 3
    border_color = rgb(89b4fa)
    position = 0, 160
    halign = center
    valign = center
}

# Big clock
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color = rgba(cdd6f4ff)
    font_size = 80
    font_family = FiraCode Nerd Font Bold
    position = 0, 40
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = rgba(a6adc8dd)
    font_size = 18
    font_family = FiraCode Nerd Font
    position = 0, -50
    halign = center
    valign = center
}

# Greeting
label {
    monitor =
    text = Hey, Anurag
    color = rgba(cdd6f4aa)
    font_size = 13
    font_family = FiraCode Nerd Font
    position = 0, -90
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 300, 52
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.2
    outer_color = rgb(89b4fa)
    inner_color = rgb(1e1e2e)
    font_color = rgb(cdd6f4)
    fade_on_empty = true
    placeholder_text = <i> Enter Password</i>
    hide_input = false
    check_color = rgb(a6e3a1)
    fail_color = rgb(f38ba8)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    rounding = 12
    position = 0, -190
    halign = center
    valign = center
}
