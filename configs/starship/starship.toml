format = """
[░▒▓](#a3aed2)\
[ $os $username ](bg:#a3aed2 fg:#090c0c)\
[](bg:#769ff0 fg:#a3aed2)\
[ $directory ](bg:#769ff0 fg:#090c0c)\
[](bg:#394260 fg:#769ff0)\
[ $git_branch $git_status ](bg:#394260 fg:#769ff0)\
[](fg:#394260)\
\n$character"""

[username]
show_always = true
style_user = "bg:#a3aed2 fg:#090c0c"
format = '[$user ]($style)'

[directory]
style = "bg:#769ff0 fg:#090c0c"
format = "[ $path ]($style)"
truncation_length = 3

[git_branch]
symbol = ""
style = "bg:#394260 fg:#769ff0"
format = '[[ $symbol $branch ](bg:#394260 fg:#769ff0)]($style)'

[git_status]
style = "bg:#394260 fg:#769ff0"
format = '[[($all_status$ahead_behind )](bg:#394260 fg:#769ff0)]($style)'

[nodejs]
style = "bg:#212736 fg:#769ff0"
format = '[[ $symbol ($version) ](bg:#212736 fg:#769ff0)]($style)'

[time]
disabled = false
style = "bg:#1d2230 fg:#769ff0"
format = '[[  $time ](bg:#1d2230 fg:#769ff0)]($style)'
